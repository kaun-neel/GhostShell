name: my-shell
version: 1.0.0
license: MIT
author: Indraneel Bose
maintainer: indraneel@example.com

dependencies:
  - base >= 4.19 && < 5
  - process
  - directory
  - filepath

executables:
  my-shell:
    main: Main.hs
    source-dirs: app
    ghc-options:
      - -threaded
      - -rtsopts
      - -with-rtsopts=-N